services:
  picmd2:
    image: ghcr.io/asano69/picmd2:latest
    container_name: picmd2
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - picmd2.env
    volumes:
      - ./data:/picmd2/pb_data
        #- /etc/ssl/certs/root_ca.crt:/certs/root_ca.crt:ro # optional
    environment:
      - TZ=Europe/London
